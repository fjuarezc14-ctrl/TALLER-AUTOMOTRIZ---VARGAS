<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ERP - Inversiones y Soluciones Vargas</title>
  <meta name="description" content="Sistema ERP para gestión operativa del Taller Automotriz Vargas. Órdenes de servicio, inventario, facturación y clientes.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/style.css">
  <style media="print">
    body > * { display: none !important; }
    #print-area, #print-area * { display: block !important; visibility: visible !important; }
    #print-area { position: absolute; left: 0; top: 0; width: 100%; }
  </style>
</head>
<body class="flex h-screen overflow-hidden">

  <!-- ══ SIDEBAR ══════════════════════════════════════════ -->
  <aside id="sidebar-menu" class="sidebar">

    <!-- Logo -->
    <div class="sidebar-logo">
      <div class="logo-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
      </div>
      <div>
        <span class="logo-text">INVERSIONES Y SOLUCIONES<span class="logo-brand"> VARGAS</span></span>
      </div>
    </div>

    <!-- Nav -->
    <nav class="sidebar-nav">
      <button class="sidebar-item sidebar-active" data-route="/" onclick="navigate('/')">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>
        Dashboard
      </button>
      <button class="sidebar-item" data-route="/ordenes" onclick="navigate('/ordenes')">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="8" height="4" x="8" y="2" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M12 11h4"/><path d="M12 16h4"/><path d="M8 11h.01"/><path d="M8 16h.01"/></svg>
        Órdenes de Servicio
      </button>
      <button class="sidebar-item" data-route="/vehiculos" onclick="navigate('/vehiculos')">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 17H5a2 2 0 0 1-2-2V9.5L5.5 4h13l2.5 5.5V15a2 2 0 0 1-2 2Z"/><circle cx="8.5" cy="17" r="2.5"/><circle cx="15.5" cy="17" r="2.5"/><path d="M5 10h14"/></svg>
        Vehículos
      </button>
      <button class="sidebar-item" data-route="/clientes" onclick="navigate('/clientes')">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Clientes
      </button>
      <button class="sidebar-item" data-route="/operaciones" onclick="navigate('/operaciones')">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8"/><path d="M12 17v4"/><path d="M7 8h.01"/><path d="M11 8h6"/><path d="M7 12h.01"/><path d="M11 12h6"/></svg>
        Operaciones
      </button>
      <button class="sidebar-item" data-route="/almacen" onclick="navigate('/almacen')">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 21.73a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73z"/><path d="M12 22V12"/><polyline points="3.29 7 12 12 20.71 7"/></svg>
        Almacén / Repuestos
      </button>
      <button class="sidebar-item" data-route="/facturacion" onclick="navigate('/facturacion')">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/></svg>
        Facturación
      </button>
      <button class="sidebar-item" data-route="/archivos" onclick="navigate('/archivos')">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/></svg>
        Archivos
      </button>
    </nav>

    <!-- Stock Alert Badge -->
    <div id="sidebar-stock-alert" class="sidebar-stock-alert hidden">
      <div class="alert-icon">⚠</div>
      <div>
        <p class="alert-title">Alerta de Stock</p>
        <p id="sidebar-alert-count" class="alert-desc">0 producto(s) bajo mínimo</p>
      </div>
    </div>

    <!-- User -->
    <div class="sidebar-user">
      <div class="user-avatar">AD</div>
      <div>
        <p class="user-name">Administrador</p>
        <p class="user-role">Taller Vargas</p>
      </div>
    </div>
  </aside>

  <!-- ══ MAIN ═════════════════════════════════════════════ -->
  <div class="flex-1 flex flex-col overflow-hidden relative">
    <!-- Botón flotante de menú para móviles -->
    <button id="btn-menu-toggle" class="mobile-menu-btn md:hidden" onclick="toggleSidebar()" title="Abrir Menú">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>


    <!-- Main content (cada módulo renderiza aquí) -->
    <main id="main-content" class="main-content">
      <div class="flex items-center justify-center h-full">
        <div class="text-center">
          <div class="w-12 h-12 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
          <p class="text-slate-400 font-medium">Iniciando sistema...</p>
        </div>
      </div>
    </main>
  </div>

  <!-- Sidebar backdrop (mobile) -->
  <div id="sidebar-backdrop" class="sidebar-backdrop hidden" onclick="toggleSidebar()"></div>

  <div id="print-area" style="display:none"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
